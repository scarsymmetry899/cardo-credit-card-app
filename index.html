<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />
    
    <!-- iOS Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Cardo">
    <link rel="apple-touch-icon" href="/icon-192x192.png">
    
    <!-- Android Meta Tags -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#C9A84C">
    <meta name="background-color" content="#06060F">
    
    <!-- SMS and Permissions Meta Tags -->
    <meta name="permissions" content="sms">
    <meta name="sms-verification" content="enabled">
    
    <!-- Open Graph Meta Tags -->
    <meta property="og:title" content="Cardo - Credit Card Companion">
    <meta property="og:description" content="India's Smart Credit Card Companion - Optimize your spending and maximize rewards">
    <meta property="og:image" content="/icon-512x512.png">
    <meta property="og:url" content="https://cardo.app">
    <meta property="og:type" content="website">
    
    <!-- Twitter Card Meta Tags -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Cardo - Credit Card Companion">
    <meta name="twitter:description" content="India's Smart Credit Card Companion">
    <meta name="twitter:image" content="/icon-512x512.png">
    
    <!-- SEO Meta Tags -->
    <meta name="description" content="India's Smart Credit Card Companion - Optimize spending, maximize rewards, and get AI-powered recommendations for 35+ Indian credit cards">
    <meta name="keywords" content="credit card, India, rewards, cashback, HDFC, SBI, ICICI, Axis Bank, financial app, SMS sync">
    <meta name="author" content="Cardo Team">
    <meta name="robots" content="index, follow">
    
    <!-- Security Headers -->
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'self' 'unsafe-inline' 'unsafe-eval' https:;
      script-src 'self' 'unsafe-inline' 'unsafe-eval' https:;
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
      font-src 'self' https://fonts.gstatic.com;
      img-src 'self' data: https:;
      connect-src 'self' https: wss:;
      worker-src 'self';
      manifest-src 'self';
    ">
    
    <title>Cardo - India's Smart Credit Card Companion</title>
    
    <!-- Preload Critical Resources -->
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" as="style">
    <link rel="preload" href="/sw-sms.js" as="script">
    
    <!-- Critical CSS for Loading Screen -->
    <style>
      /* Critical loading screen CSS */
      #loading-screen {
        position: fixed;
        inset: 0;
        background: #06060F;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      }
      
      .loading-content {
        text-align: center;
        color: #E8E8F4;
      }
      
      .loading-logo {
        font-size: 48px;
        font-weight: 800;
        margin-bottom: 16px;
        letter-spacing: -2px;
      }
      
      .loading-logo .c {
        color: #C9A84C;
      }
      
      .loading-text {
        font-size: 14px;
        color: #777799;
        margin-bottom: 32px;
      }
      
      .loading-spinner {
        width: 32px;
        height: 32px;
        border: 2px solid rgba(201, 168, 76, 0.2);
        border-top: 2px solid #C9A84C;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin: 0 auto;
      }
      
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <!-- Loading Screen -->
    <div id="loading-screen">
      <div class="loading-content">
        <div class="loading-logo">
          <span class="c">C</span>ardo
        </div>
        <div class="loading-text">
          India's Smart Credit Card Companion
        </div>
        <div class="loading-spinner"></div>
      </div>
    </div>
    
    <!-- Main App Container -->
    <div id="root"></div>
    
    <!-- Service Worker Registration -->
    <script>
      // Register SMS Service Worker
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', async () => {
          try {
            const registration = await navigator.serviceWorker.register('/sw-sms.js', {
              scope: '/',
              updateViaCache: 'none'
            });
            
            console.log('SMS Service Worker registered successfully:', registration);
            
            // Listen for updates
            registration.addEventListener('updatefound', () => {
              const newWorker = registration.installing;
              newWorker.addEventListener('statechange', () => {
                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                  console.log('New SMS Service Worker available');
                  // Could show update notification
                }
              });
            });
            
          } catch (error) {
            console.error('SMS Service Worker registration failed:', error);
          }
        });
      }
      
      // Request notification permission
      if ('Notification' in window && Notification.permission === 'default') {
        Notification.requestPermission();
      }
      
      // Hide loading screen when React app loads
      window.addEventListener('load', () => {
        setTimeout(() => {
          const loadingScreen = document.getElementById('loading-screen');
          if (loadingScreen) {
            loadingScreen.style.opacity = '0';
            setTimeout(() => {
              loadingScreen.remove();
            }, 300);
          }
        }, 1000);
      });
      
      // PWA Install Prompt
      let deferredPrompt;
      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        console.log('PWA install prompt ready');
      });
      
      // Handle PWA install
      window.installPWA = async () => {
        if (deferredPrompt) {
          deferredPrompt.prompt();
          const { outcome } = await deferredPrompt.userChoice;
          console.log('PWA install outcome:', outcome);
          deferredPrompt = null;
        }
      };
    </script>
    
    <!-- Main Application Script -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
